<style>

  .font-kr { font-family: 'Noto Serif KR', serif; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* paper grain */
  .paper-grain {
    background-color: #FAFAF5;
    background-image:
      radial-gradient(rgba(10,10,10,0.035) 1px, transparent 1px),
      radial-gradient(rgba(176,137,52,0.04) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }
  .parch-grain {
    background-color: #F1ECDD;
    background-image: radial-gradient(rgba(10,10,10,0.05) 1px, transparent 1px);
    background-size: 3px 3px;
  }

  /* sun/halo behind hero */
  .halo {
    background: radial-gradient(closest-side, rgba(212,185,112,0.35), rgba(212,185,112,0.08) 55%, transparent 72%);
  }

  /* gold rays */
  .ray {
    position: absolute;
    width: 1px;
    background: linear-gradient(to bottom, transparent, #D4B970 30%, #D4B970 70%, transparent);
    transform-origin: top center;
  }

  /* marching ants for "anointed" borders */
  .anointed {
    background-image:
      linear-gradient(90deg, #B08934 50%, transparent 50%),
      linear-gradient(90deg, #B08934 50%, transparent 50%),
      linear-gradient(0deg, #B08934 50%, transparent 50%),
      linear-gradient(0deg, #B08934 50%, transparent 50%);
    background-size: 8px 1px, 8px 1px, 1px 8px, 1px 8px;
    background-position: 0 0, 0 100%, 0 0, 100% 0;
    background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
  }

  /* drop cap */
  .dropcap::first-letter {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 5.5rem;
    line-height: 0.85;
    float: left;
    padding: 0.35rem 0.6rem 0 0;
    color: #B08934;
    font-style: italic;
  }

  /* thin rule */
  .rule { height: 1px; background: #0A0A0A; }
  .rule-gold { height: 1px; background: #B08934; }

  /* selection */
  ::selection { background: #B08934; color: #FAFAF5; }

  /* kbd style counter */
  .counter-digit {
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }

  /* fancy number */
  .ornate-num {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
  }

  /* subtle float for halo */
  @keyframes breathe {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.02); }
  }
  .breathe { animation: breathe 7s ease-in-out infinite; }

  /* scan line for watermark */

  /* smooth scroll */
  html { scroll-behavior: smooth; }

  /* hide the pure scrollbar on sacred rail */

    mix-blend-mode: multiply;
    transition: opacity 0.3s ease;

<script>
  // Cursor Halo Interaction
  document.addEventListener('DOMContentLoaded', () => {
    const halo = document.getElementById('cursor-halo');
    if (!halo) return;
    
    let isMouseIn = false;
    
    document.addEventListener('mousemove', (e) => {
      if (!isMouseIn) {
        halo.style.opacity = '1';
        isMouseIn = true;
      }
      // Use requestAnimationFrame for smoother following if needed, 
      // but direct top/left with CSS transform is usually fast enough
      halo.style.left = e.clientX + 'px';
      halo.style.top = e.clientY + 'px';
    });

    document.addEventListener('mouseleave', () => {
       halo.style.opacity = '0';
       isMouseIn = false;
    });
    document.addEventListener('mouseenter', () => {
       halo.style.opacity = '1';
       isMouseIn = true;
    });
  });
</script>
