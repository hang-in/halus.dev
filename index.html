<style>
  :root {
    --c-paper: #FAFAF5;
    --c-parch: #F1ECDD;
    --c-ink: #0A0A0A;
    --c-gold: #B08934;
    --c-goldlt: #D4B970;
    --c-sage: #8A9A7A;
    --c-sagedk: #5C6B52;
    --c-ash: #3A3A36;
  }

  .theme-crypt {
    --c-paper: #080808;
    --c-parch: #131210;
    --c-ink: #E6E3DB;
    --c-gold: #C29A44;
    --c-goldlt: #E8CC8B;
    --c-sage: #9AB08A;
    --c-sagedk: #738A66;
    --c-ash: #8A8982;
  }

  html, body { background: var(--c-paper); color: var(--c-ink); transition: background-color 0.4s ease, color 0.4s ease; }
  body { font-family: 'Cormorant Garamond', serif; font-weight: 400; }
  .font-kr { font-family: 'Noto Serif KR', serif; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* paper/crypt grain */
  .paper-grain {
    background-color: var(--c-paper);
    background-image:
      radial-gradient(color-mix(in srgb, var(--c-ink) 3.5%, transparent) 1px, transparent 1px),
      radial-gradient(color-mix(in srgb, var(--c-gold) 4%, transparent) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }
  .parch-grain {
    background-color: var(--c-parch);
    background-image: radial-gradient(color-mix(in srgb, var(--c-ink) 5%, transparent) 1px, transparent 1px);
    background-size: 3px 3px;
  }

  /* sun/halo behind hero */
  .halo {
    background: radial-gradient(closest-side, color-mix(in srgb, var(--c-goldlt) 35%, transparent), color-mix(in srgb, var(--c-goldlt) 8%, transparent) 55%, transparent 72%);
  }

  /* gold rays */
  .ray {
    position: absolute;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--c-goldlt) 30%, var(--c-goldlt) 70%, transparent);
    transform-origin: top center;
  }

  /* marching ants for "anointed" borders */
  .anointed {
    background-image:
      linear-gradient(90deg, var(--c-gold) 50%, transparent 50%),
      linear-gradient(90deg, var(--c-gold) 50%, transparent 50%),
      linear-gradient(0deg, var(--c-gold) 50%, transparent 50%),
      linear-gradient(0deg, var(--c-gold) 50%, transparent 50%);
    background-size: 8px 1px, 8px 1px, 1px 8px, 1px 8px;
    background-position: 0 0, 0 100%, 0 0, 100% 0;
    background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
  }

  /* drop cap */
  .dropcap::first-letter {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 5.5rem;
    line-height: 0.85;
    float: left;
    padding: 0.35rem 0.6rem 0 0;
    color: var(--c-gold);
    font-style: italic;
  }

  /* thin rule */
  .rule { height: 1px; background: var(--c-ink); }
  .rule-gold { height: 1px; background: var(--c-gold); }

  /* selection */
  ::selection { background: var(--c-gold); color: var(--c-paper); }

  /* kbd style counter */
  .counter-digit {
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }

  /* fancy number */
  .ornate-num {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
  }

  /* subtle float for halo */
  @keyframes breathe {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.02); }
  }
  .breathe { animation: breathe 7s ease-in-out infinite; }

  /* scan line for watermark */
  .watermark-scan {
    background-image: repeating-linear-gradient(
      45deg,
      color-mix(in srgb, var(--c-gold) 12%, transparent) 0 2px,
      transparent 2px 14px
    );
  }

  /* smooth scroll */
  html { scroll-behavior: smooth; }

  /* hide the pure scrollbar on sacred rail */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* interactive cursor halo */
  #cursor-halo {
    position: fixed;
    top: 0;
    left: 0;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle closest-side, color-mix(in srgb, var(--c-goldlt) 6%, transparent), transparent);
    mix-blend-mode: multiply;
    transition: opacity 0.3s ease;
    opacity: 0;
  }
  .theme-crypt #cursor-halo {
    mix-blend-mode: screen;
    background: radial-gradient(circle closest-side, color-mix(in srgb, var(--c-goldlt) 6%, transparent), transparent);
  }
</style>

<script>
  // Cursor Halo Interaction
  document.addEventListener('DOMContentLoaded', () => {
    const halo = document.getElementById('cursor-halo');
    if (!halo) return;
    
    let isMouseIn = false;
    
    document.addEventListener('mousemove', (e) => {
      if (!isMouseIn) {
        halo.style.opacity = '1';
        isMouseIn = true;
      }
      // Use requestAnimationFrame for smoother following if needed, 
      // but direct top/left with CSS transform is usually fast enough
      halo.style.left = e.clientX + 'px';
      halo.style.top = e.clientY + 'px';
    });

    document.addEventListener('mouseleave', () => {
       halo.style.opacity = '0';
       isMouseIn = false;
    });
    document.addEventListener('mouseenter', () => {
       halo.style.opacity = '1';
       isMouseIn = true;
    });
  });
</script>
</body>
